  <text x="450" y="21" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, 'Cascadia Code', Consolas, monospace" font-size="12" fill="#57606a">whoami.sh</text>
  <text x="868" y="21" text-anchor="end" font-family="ui-monospace, SFMono-Regular, 'Cascadia Code', Consolas, monospace" font-size="11" fill="#57606a">01 — WHOAMI</text>
  <text x="32" y="76" font-family="ui-monospace, SFMono-Regular, 'Cascadia Code', Consolas, monospace" font-size="15" fill="#57606a" opacity="0">$ whoami<animate attributeName="opacity" from="0" to="1" begin="0.00s" dur="0.4s" fill="freeze"/></text>
  <text x="32" y="100" font-family="ui-monospace, SFMono-Regular, 'Cascadia Code', Consolas, monospace" font-size="15" fill="#0d1117" opacity="0">&gt; Rahim Jamil — Computer Engineering @ NUST (CEME)<animate attributeName="opacity" from="0" to="1" begin="0.15s" dur="0.4s" fill="freeze"/></text>
  <text x="32" y="124" font-family="ui-monospace, SFMono-Regular, 'Cascadia Code', Consolas, monospace" font-size="15" fill="#0d1117" opacity="0">&gt; Class of 2026<animate attributeName="opacity" from="0" to="1" begin="0.30s" dur="0.4s" fill="freeze"/></text>
  <text x="32" y="172" font-family="ui-monospace, SFMono-Regular, 'Cascadia Code', Consolas, monospace" font-size="15" fill="#57606a" opacity="0">$ focus --current<animate attributeName="opacity" from="0" to="1" begin="0.45s" dur="0.4s" fill="freeze"/></text>
  <text x="32" y="196" font-family="ui-monospace, SFMono-Regular, 'Cascadia Code', Consolas, monospace" font-size="15" fill="#0d1117" opacity="0">&gt; shipping a FastAPI service around a bioinformatics pipeline<animate attributeName="opacity" from="0" to="1" begin="0.60s" dur="0.4s" fill="freeze"/></text>
  <text x="32" y="220" font-family="ui-monospace, SFMono-Regular, 'Cascadia Code', Consolas, monospace" font-size="15" fill="#0d1117" opacity="0">&gt; building AI/ML systems that hold up outside the notebook<animate attributeName="opacity" from="0" to="1" begin="0.75s" dur="0.4s" fill="freeze"/></text>
  <text x="32" y="244" font-family="ui-monospace, SFMono-Regular, 'Cascadia Code', Consolas, monospace" font-size="15" fill="#0d1117" opacity="0">&gt; applying to Master's programs abroad<animate attributeName="opacity" from="0" to="1" begin="0.90s" dur="0.4s" fill="freeze"/></text>
  <text x="32" y="268" font-family="ui-monospace, SFMono-Regular, 'Cascadia Code', Consolas, monospace" font-size="15" fill="#0d1117" opacity="0">&gt; side project: reverse-engineering forex market structure<animate attributeName="opacity" from="0" to="1" begin="1.05s" dur="0.4s" fill="freeze"/></text>
