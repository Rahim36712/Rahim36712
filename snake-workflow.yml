# Optional bonus: animates your contribution graph as a snake eating your commits.
#
# SETUP (2 minutes):
# 1. In your Rahim36712/Rahim36712 repo, create the file:
#      .github/workflows/snake.yml
#    and paste in everything below this line.
# 2. Go to the repo's Settings -> Actions -> General -> Workflow permissions,
#    and set it to "Read and write permissions". Save.
# 3. Go to the Actions tab, select "Generate Snake" in the sidebar, and click
#    "Run workflow" once to generate it immediately (it also runs daily on its own).
# 4. After it finishes, the SVGs are available at:
#      https://raw.githubusercontent.com/Rahim36712/Rahim36712/output/github-contribution-grid-snake.svg
#      https://raw.githubusercontent.com/Rahim36712/Rahim36712/output/github-contribution-grid-snake-dark.svg
#    Paste the <picture> snippet from README.md wherever you want the snake to appear.

name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *" # once a day
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Rahim36712
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
